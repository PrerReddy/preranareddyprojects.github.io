<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Main wrapper handling the scroll snap -->
    <main class="scroll-container">

        <!-- SCREEN 1: THE INTRO PAGE -->
        <section class="viewport-page intro-page">
            <div class="intro-content">
                <h1>Research Project Archive</h1>
                <p>Exploring the intersection of computational neuroscience, reinforcement learning, and human decision-making.</p>
            </div>
            <div class="scroll-prompt">
                <span>Scroll to view archive</span>
                <span class="arrow">↓</span>
            </div>
        </section>

        <!-- SCREEN 2: THE ARCHIVE GRID PAGE -->
        <section class="viewport-page archive-page">
            
            <!-- LEFT SIDEBAR -->
            <aside class="sidebar">
                <div class="brand-title">
                    <h1>Research<br>Project<br>Archive</h1>
                </div>
                
                <nav class="categories">
                    <a href="#" class="active">All</a>
                    <a href="#">Reinforcement Learning</a>
                    <a href="#">Computational Neuroscience</a>
                    <a href="#">EEG Signal Processing</a>
                    <a href="#">Decision Making</a>
                    <a href="#">Memory Systems</a>
                </nav>
            </aside>

            <!-- RIGHT GRID CANVAS -->
            <section class="project-grid">
                
                <a href="https://github.com" target="_blank" class="grid-box">
                    <img src="eeg-cap.png" alt="EEG Signal Processor" class="grid-image">
                </a>

                <a href="https://github.com" target="_blank" class="grid-box">
                    <img src="neural-net.png" alt="RL Decision Engine" class="grid-image">
                </a>

                <a href="https://github.com" target="_blank" class="grid-box">
                    <img src="memory-model.png" alt="Memory Model" class="grid-image">
                </a>

                <a href="https://github.com" target="_blank" class="grid-box">
                    <img src="decoder-ui.png" alt="Neural Decoder" class="grid-image">
                </a>

                <div class="grid-box empty"></div>
                <div class="grid-box empty"></div>
                
            </section>
            
        </section>

    </main>

</body>
</html>
