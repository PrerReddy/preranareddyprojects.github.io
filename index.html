<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Portfolio</title>
    <!-- Connecting your CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Main wrapper that handles the scroll locking -->
    <main class="scroll-container">

        <!-- FIRST PAGE: Intro -->
        <section class="page hero-page">
            <div class="intro-text">
                <h1>Hi, I'm a Researcher</h1>
                <p>Exploring the intersection of computational neuroscience, reinforcement learning, and human decision-making.</p>
            </div>
            <div class="scroll-indicator">
                <span>Scroll to view stack</span>
                <div class="arrow">↓</div>
            </div>
        </section>

        <!-- SECOND PAGE: The Project Canvas -->
<section class="page canvas-page">
    
    <!-- Project Item 1 -->
    <a href="https://github.com" target="_blank" class="project-item item-1">
        <div class="icon-box">
            <img src="eeg-cap.png" alt="EEG Cap Project Icon" class="project-icon">
        </div>
        <div class="label">EEG Signal Processor</div>
    </a>

    <!-- Project Item 2 -->
    <a href="https://github.com" target="_blank" class="project-item item-2">
        <div class="icon-box">
            <img src="neural-net.png" alt="Neural Network Icon" class="project-icon">
        </div>
        <div class="label">RL Decision Engine</div>
    </a>

    <!-- Project Item 3 -->
    <a href="https://github.com" target="_blank" class="project-item item-3">
        <div class="icon-box">
            <img src="memory-model.png" alt="Memory Model Icon" class="project-icon">
        </div>
        <div class="label">Computational Memory Model</div>
    </a>

    <!-- Project Item 4 -->
    <a href="https://github.com" target="_blank" class="project-item item-4">
        <div class="icon-box">
            <img src="decoder-ui.png" alt="Decoder UI Icon" class="project-icon">
        </div>
        <div class="label">Neural Decoder UI</div>
    </a>

    <!-- Canvas Center Badge -->
    <div class="center-badge">Project Inventory</div>
    
</section>
    </main>

</body>
</html>
